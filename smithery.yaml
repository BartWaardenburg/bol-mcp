startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - clientId
      - clientSecret
    properties:
      clientId:
        type: string
        description: bol.com API client ID
      clientSecret:
        type: string
        description: bol.com API client secret
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'bol-mcp'],
      env: {
        BOL_CLIENT_ID: config.clientId,
        BOL_CLIENT_SECRET: config.clientSecret
      }
    })
